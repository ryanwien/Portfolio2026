<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Task Tracker</h1>
            <p class="subtitle">A full-stack task management app</p>
        </header>

        <!-- Summary stats, populated from the /api/stats endpoint -->
        <section class="stats" id="stats">
            <div class="stat-card">
                <span class="stat-number" id="stat-total">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="stat-pending">0</span>
                <span class="stat-label">Pending</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="stat-completed">0</span>
                <span class="stat-label">Completed</span>
            </div>
        </section>

        <!-- Form to create a new task -->
        <section class="task-form">
            <input type="text" id="task-title" placeholder="Task title..." maxlength="120">
            <input type="text" id="task-description" placeholder="Description (optional)...">
            <select id="task-priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
            </select>
            <button id="add-btn">Add Task</button>
        </section>

        <!-- Filter buttons -->
        <section class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </section>

        <!-- Task list, populated by JavaScript -->
        <section class="task-list" id="task-list"></section>
    </div>

    <script src="app.js"></script>
</body>
</html>
